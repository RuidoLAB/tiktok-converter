<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Link Converter</title>
<meta name="description" content="Convierte links cortos de TikTok a URLs de escritorio al instante.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e0ddd6;
  --border-dark: #c8c4bb;
  --text: #1a1815;
  --muted: #8a8680;
  --accent: #ff2d55;
  --accent-teal: #00bfa5;
  --success: #1a7a4a;
  --success-bg: #eaf7f0;
  --danger: #c0392b;
  --danger-bg: #fdf0ee;
  --warning: #b45309;
  --warning-bg: #fef3cd;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 6px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* grid background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.5;
}

main {
  position: relative; z-index: 1;
  max-width: 680px; width: 100%;
  margin: 0 auto; padding: 4rem 1.5rem 6rem;
  flex: 1;
}

/* ── header ── */
.header { margin-bottom: 3rem; }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--text); color: var(--bg);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  padding: 4px 10px; border-radius: 4px;
  margin-bottom: 1rem;
}

.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

h1 {
  font-family: var(--mono); font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 600; letter-spacing: -0.03em; line-height: 1.1;
  margin-bottom: 0.5rem;
}

h1 span { color: var(--accent); }

.subtitle { font-size: 15px; color: var(--muted); font-weight: 300; line-height: 1.6; }

/* ── input card ── */
.card {
  background: var(--surface);
  border: 1.5px solid var(--border-dark);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 4px 4px 0 var(--border-dark);
}

.label {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.6rem;
  display: flex; align-items: center; gap: 8px;
}

.label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

textarea {
  width: 100%; min-height: 150px; resize: vertical;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: var(--mono); font-size: 12px; line-height: 1.9;
  padding: 0.9rem 1rem; outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--text); }
textarea::placeholder { color: #bbb8b0; }

.btn-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; align-items: center; }

.btn {
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 10px 22px; border-radius: var(--radius);
  cursor: pointer; transition: all 0.12s;
  border: 1.5px solid transparent;
  display: inline-flex; align-items: center; gap: 7px;
}

.btn-primary {
  background: var(--text); color: var(--bg);
  border-color: var(--text);
  box-shadow: 3px 3px 0 var(--border-dark);
}
.btn-primary:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--border-dark); }
.btn-primary:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--border-dark); }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: 3px 3px 0 var(--border-dark); }

.btn-outline {
  background: transparent; color: var(--text); border-color: var(--border-dark);
}
.btn-outline:hover { border-color: var(--text); background: var(--bg); }

.count-hint { font-size: 12px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

/* ── progress ── */
.progress-wrap { margin-top: 1rem; display: none; }
.progress-track {
  height: 3px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-teal));
  transition: width 0.25s ease; border-radius: 2px;
}
.progress-label {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  margin-top: 6px; text-align: right;
}

/* ── stats ── */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }

.stat {
  background: var(--surface); border: 1.5px solid var(--border-dark);
  border-radius: var(--radius); padding: 0.9rem 1rem;
  box-shadow: 2px 2px 0 var(--border-dark);
}
.stat-n {
  font-family: var(--mono); font-size: 1.8rem; font-weight: 600; line-height: 1;
}
.stat-n.ok { color: var(--success); }
.stat-n.fail { color: var(--danger); }
.stat-n.total { color: var(--text); }
.stat-l { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }

/* ── results list ── */
.results { display: none; }

.link-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }

.link-item {
  border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 0.75rem 1rem;
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface);
  animation: slideIn 0.2s ease forwards; opacity: 0;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.link-item.ok   { border-color: #a8d5b8; background: var(--success-bg); }
.link-item.fail { border-color: #f0bab4; background: var(--danger-bg); }
.link-item.wait { border-color: #f0d9a0; background: var(--warning-bg); }

.status-icon { font-size: 14px; flex-shrink: 0; margin-top: 2px; }

.link-body { flex: 1; min-width: 0; }
.link-from { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.link-to   { font-family: var(--mono); font-size: 12px; word-break: break-all; line-height: 1.5; }
.link-to a { color: var(--success); text-decoration: none; }
.link-to a:hover { text-decoration: underline; }
.link-to.fail-text { color: var(--danger); }
.link-to.wait-text { color: var(--warning); font-style: italic; }

.copy-one {
  background: transparent; border: 1px solid var(--border-dark);
  color: var(--muted); padding: 3px 9px; border-radius: 4px;
  font-size: 11px; cursor: pointer; flex-shrink: 0;
  font-family: var(--mono); transition: all 0.12s;
}
.copy-one:hover { border-color: var(--text); color: var(--text); }
.copy-one.done  { border-color: var(--success); color: var(--success); }

/* ── output card ── */
.out-area {
  font-family: var(--mono); font-size: 12px; line-height: 1.9;
  width: 100%; min-height: 90px; padding: 0.9rem 1rem; resize: vertical;
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--success);
  outline: none;
}

/* ── footer ── */
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 2rem 1rem;
  font-family: var(--mono); font-size: 11px; color: var(--border-dark);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>
<main>

  <div class="header">
    <div class="badge"><span class="badge-dot"></span> GRATIS · SIN REGISTRO</div>
    <h1>TikTok<br><span>Link</span> Converter</h1>
    <p class="subtitle">Pega links cortos de TikTok móvil y obtén<br>las URLs limpias de escritorio al instante.</p>
  </div>

  <div class="card">
    <div class="label">Links de entrada</div>
    <textarea id="input" placeholder="https://vt.tiktok.com/ZS9vxCV6A/
https://vt.tiktok.com/ZS9vOtro/
https://vm.tiktok.com/ZS9vMas/" oninput="updateCount()"></textarea>

    <div class="btn-row">
      <button class="btn btn-primary" id="btnConvert" onclick="run()">
        ▶ Convertir
      </button>
      <button class="btn btn-outline" onclick="clearAll()">Limpiar</button>
      <span class="count-hint" id="countHint"></span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="stats">
      <div class="stat"><div class="stat-n total" id="sTotal">0</div><div class="stat-l">total</div></div>
      <div class="stat"><div class="stat-n ok"    id="sOk">0</div><div class="stat-l">convertidos</div></div>
      <div class="stat"><div class="stat-n fail"  id="sFail">0</div><div class="stat-l">fallidos</div></div>
    </div>

    <div class="link-list" id="linkList"></div>

    <div class="card">
      <div class="label">Resultado final</div>
      <textarea class="out-area" id="output" readonly></textarea>
      <div class="btn-row" style="margin-top:1rem">
        <button class="btn btn-primary" id="btnCopyAll" onclick="copyAll()">Copiar todo</button>
        <button class="btn btn-outline" onclick="download()">Descargar .txt</button>
      </div>
    </div>
  </div>

</main>

<footer>tiktok-converter · open source · sin cookies · sin tracking</footer>

<script>
  let resolved = [];
  let nOk = 0, nFail = 0;

  function lines() {
    return document.getElementById('input').value
      .split('\n').map(l => l.trim()).filter(Boolean);
  }

  function updateCount() {
    const n = lines().length;
    document.getElementById('countHint').textContent = n > 0 ? `${n} link${n>1?'s':''}` : '';
  }

  function cleanUrl(url) {
    try {
      const u = new URL(url);
      const keep = ['_r','_t'];
      const p = new URLSearchParams();
      for (const [k,v] of u.searchParams) if (keep.includes(k)) p.set(k,v);
      const base = 'https://www.tiktok.com' + u.pathname;
      const qs = p.toString();
      return qs ? base + '?' + qs : base;
    } catch { return url; }
  }

  async function expandOne(url) {
    const res = await fetch('/api/expand', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!res.ok) throw new Error('api error');
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data.result;
  }

  async function run() {
    const ls = lines();
    if (!ls.length) return;

    resolved = []; nOk = 0; nFail = 0;

    document.getElementById('results').style.display = 'block';
    document.getElementById('linkList').innerHTML = '';
    document.getElementById('output').value = '';
    document.getElementById('sTotal').textContent = ls.length;
    document.getElementById('sOk').textContent = '0';
    document.getElementById('sFail').textContent = '0';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('btnConvert').disabled = true;

    // pre-render filas pending
    ls.forEach((link, i) => {
      const row = document.createElement('div');
      row.className = 'link-item wait';
      row.id = `row${i}`;
      row.style.animationDelay = `${i*25}ms`;
      row.innerHTML = `<span class="status-icon">⏳</span>
        <div class="link-body">
          <div class="link-from">${link}</div>
          <div class="link-to wait-text" id="to${i}">procesando…</div>
        </div>`;
      document.getElementById('linkList').appendChild(row);
    });

    for (let i = 0; i < ls.length; i++) {
      const link = ls[i];
      const row = document.getElementById(`row${i}`);
      const toDiv = document.getElementById(`to${i}`);
      let result;

      try {
        result = await expandOne(link);
        resolved.push(result);
        nOk++;

        row.className = 'link-item ok';
        row.querySelector('.status-icon').textContent = '✅';
        toDiv.className = 'link-to';
        toDiv.innerHTML = `<a href="${result}" target="_blank" rel="noopener">${result}</a>`;

        const btn = document.createElement('button');
        btn.className = 'copy-one'; btn.textContent = 'copiar';
        btn.onclick = () => {
          navigator.clipboard.writeText(result);
          btn.textContent = '✓'; btn.classList.add('done');
          setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('done'); }, 1500);
        };
        row.appendChild(btn);

      } catch {
        resolved.push(link);
        nFail++;
        row.className = 'link-item fail';
        row.querySelector('.status-icon').textContent = '❌';
        toDiv.className = 'link-to fail-text';
        toDiv.textContent = 'No se pudo expandir';
      }

      document.getElementById('sOk').textContent = nOk;
      document.getElementById('sFail').textContent = nFail;
      document.getElementById('progressFill').style.width = `${((i+1)/ls.length)*100}%`;
      document.getElementById('progressLabel').textContent = `${i+1} / ${ls.length}`;
      document.getElementById('output').value = resolved.join('\n');
    }

    document.getElementById('btnConvert').disabled = false;
  }

  function copyAll() {
    navigator.clipboard.writeText(document.getElementById('output').value).then(() => {
      const btn = document.getElementById('btnCopyAll');
      btn.textContent = '✓ Copiado';
      setTimeout(() => { btn.textContent = 'Copiar todo'; }, 2000);
    });
  }

  function download() {
    const blob = new Blob([document.getElementById('output').value], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tiktok-links.txt';
    a.click();
  }

  function clearAll() {
    document.getElementById('input').value = '';
    document.getElementById('results').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('countHint').textContent = '';
    resolved = [];
  }
</script>
</body>
</html>
